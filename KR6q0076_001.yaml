body:
  text: 徑山沙門語風圓信無地地主人郭凝之編集師諱慧寂韶州懷化葉氏子年九歲於廣州和安寺投通禪師出家即不語通十四歲父母取歸欲與婚媾師不從遂斷手二指跪至父母前誓求正法以答劬勞父母乃許再詣通處而得披剃未登具即遊方初謁耽源已悟玄旨後參溈山遂升堂奧耽源謂師云國師當時傳得六代祖師圓相共九十七箇授與老僧乃云吾滅後三十年南方有一沙彌到來大興此教次第傳受無令斷絶我今付汝汝當奉持遂將其本過與師師接得一覽便將火燒却耽源一日問前來諸相甚宜祕惜師云當時看了便燒却也耽源云吾此法門無人能會唯先師及諸祖師諸大聖人方可委悉子何得焚之師云慧寂一覽已知其意但用得不可執本也耽源云然雖如此於子即得後人信之不及師云和尚若要重録不難即重集一本呈上更無遺失耽源云然耽源上堂師出衆作此相以手拓呈了却叉手立耽源以兩手相交作拳示之師進前三步作女人拜耽源點頭師便禮拜師浣衲次耽源云正恁麼時作麼生師云正恁麼時向甚麼處見後參溈山溈山問汝是有主沙彌無主沙彌師云有主溈山云主在甚麼處師從西過東立溈山異之師問如何是真佛住處溈山云以思無思之妙返思靈焰之無窮思盡還源性相常住事理不二真佛如如師於言下頓悟自此執侍前後盤桓十五載師掃地次溈山問塵非掃得空不自生如何是塵非掃得師掃地一下溈山云如何是空不自生師指自身又指溈山溈山云塵非掃得空不自生離此二途又作麼生師又掃地一下又指自身并指溈山溈山一日指田問師這丘田那頭高這頭低師云却是這頭高那頭低溈山云爾若不信向中間立看兩頭師云不必中間立亦莫住兩頭溈山云若如是著水看水能平物師云水亦無定但高處高平低處低平溈山便休有施主送絹與溈山師問和尚受施主如是供餈將何報答溈山敲禪床示之師云和尚何得將衆人物作自己用一本溈山問師云有俗弟子將三束絹來與我贖鐘子故與世人受福師云俗弟子則有絹與和尚贖鐘子和尚將何物酬他溈山以拄杖敲床三下云我將這箇酬他師云若是這箇用作甚麼溈山又敲禪床三下云汝嫌這箇作甚麼師云某甲不嫌這箇只是大家底溈山云爾既知是大家底何得更就我覓物酬他師云只怪和尚把大家底行人事溈山云汝不見達磨大師從西天來此土亦將此物來人事汝諸人盡是受他信物者師在溈山為直歲作務歸溈山問甚麼處去來師云田中來溈山云田中多少人師插鍬叉手溈山云今日南山大有人刈茅師拔鍬便行玄沙備云我若見即踏倒鍬子僧問鏡清仰山插鍬意旨如何鏡清云狗䘖赦書諸侯避道僧云秖如玄沙踏倒意旨如何鏡清云不奈船何打破戽斗僧云南山刈茅意旨如何鏡清云李靖三兄久經行陳雲居鍚云且道鏡清下此一判著不著雪竇顯云諸方咸謂插鍬話奇特大似隨邪逐惡據雪竇見處仰山被溈山一問直得草繩自縛死去十分翠巖芝云仰山只得一橛諸人別有會麼師在溈山牧牛時踢天泰上座問云一毛頭師子現即不問百億毛頭百億師子現又作麼生師便騎牛歸侍立溈山次舉前話方了却見泰來師云便是這箇上座溈山遂問百億毛頭百億師子現豈不是上座道泰云是師云正當現時毛前現毛後現泰云現時不説前後溈山大笑師云師子腰折也便下去師隨溈山遊山到磐陀石上坐師侍立次忽鴉銜一紅柿落在面前溈山拾與師師接得洗了度與溈山溈山云子甚處得來師云此是和尚道德所感溈山云汝也不得無分即分半與師玄沙云大小溈山被仰山一坐至今起不得溈山問師忽有人問汝汝作麼生祇對師云東寺師叔若在某甲不致寂寞溈山云放汝一箇不祇對罪師云生之與殺祇在一言溈山云不負汝見別有人不肯師云阿誰溈山指露柱云這箇師云道甚麼溈山云道甚麼師云白鼠推遷銀臺不變師問溈山大用現前請師辨白溈山下座歸方丈師隨後入溈山問子適來問甚麼話師再舉溈山云還記得吾答語否師云記得溈山云爾試舉看師便珍重出去溈山云錯師回首云間師弟若來莫道某甲無語好師在溈山前坡牧牛次見一僧上山不久便下來師乃問上座何不且留山中僧云祇為因緣不契師云有何因緣試舉看僧云和尚問某名甚麼某答歸真和尚云歸真何在某甲無對師云上座却回向和尚道某甲道得也和尚問作麼生道但云眼裏耳裏鼻裏僧回一如所教溈山云脫空謾語漢此是五百人善知識語師臥次夢入彌勒內院衆堂中諸位皆足惟第二位空師遂就座有一尊者白槌云今當第二座説法師起白槌云摩訶衍法離四句絶百非諦聽諦聽衆皆散去及覺舉似溈山溈山云子已入聖位師便禮拜溈山秀云依文解義即不無忽然彌勒會中有箇作者才見伊道摩訶衍法便云合取兩片皮非唯止絶仰山寐語亦免使後人夢中説夢琅琊覺云且道聖衆是肯仰山是不肯仰山若肯又孤負仰山若不肯仰山猶如平地喫交山僧今日不惜眉毛與諸人説破摩訶衍法離四句絶百非爾若舉似諸方諸方恁麼會入地獄如箭射東禪觀云尊者白椎聖衆便散不妨使人疑著却待第二杓惡水潑了方始惺惺遲也且如摩訶衍法離四句絶百非道已道了諸人還識仰山麼師侍溈山行次忽見前面塵起溈山云面前是甚麼師近前看了却作此相溈山點頭溈山示衆云一切衆生皆無佛性鹽官示衆云一切衆生皆有佛性鹽官有二僧往探問既到溈山聞溈山舉揚莫測其涯若生輕慢因一日與師言話次乃勸云師兄須是勤學佛法不得容易師乃作此相以手拓呈了却拋向背後遂展兩手就二僧索二僧罔措師云吾兄直須勤學佛法不得容易便起去時二僧却回鹽官行三十里一僧忽然有省乃云當知溈山道一切衆生皆無佛性信之不錯便回溈山一僧更前行數里因過水忽然有省自歎云溈山道一切衆生皆無佛性灼然有他恁麼道亦回溈山久依法席師因鹽官會下有數人到溈山不肯伏一日因普請西莊搬禾次師至嶺頭放下後十數人亦到放下師遂舉起禾簷向諸人前行一匝云有麼有麼其一行僧並無對師云賺殺人便簷禾去溈山同師牧牛次溈山云此中還有菩薩也無師云有溈山云汝見那箇是試指出看師云和尚疑那個不是試指出看溈山便休師送果子上溈山溈山接得問子甚麼處得來師云家園底溈山云堪喫也未師云未敢嘗先獻和尚溈山云是阿誰底師云慧寂底溈山云既是子底因甚麼教我先嘗師云和尚嘗千嘗萬溈山便喫云猶帶酸澀在師云酸澀莫非自知溈山不答師夏末問訊溈山次溈山云子一夏不見上來在下面作何所務師云某甲在下面鉏得一片畬下得一籮種溈山云子今夏不虛過師却問未審和尚一夏之中作何所務溈山云日中一食夜後一寢師云和尚今夏亦不虛過道了乃吐舌溈山云寂子何得自傷己命溈山哲云仰山眼照四天下到大圓面前却向淨地喫交大圓可謂養子之緣不免挂後人唇齒龍門遠云溈仰父子尋常相見遊戲神通不同小小還有知得底麼若無山僧與汝諸人説看開得一片畬綿綿密密兩頓粥飯其道自辦山僧一夏與諸人相見自是諸人不薦若也薦成一片是甚麼一片看取當門箭西禪儒云溈仰父子出入卷舒得能自在諸人切不得作世諦商量又不得作佛法解會既總不許與麼商量畢竟如何會開得一片畬種得一籮粟回頭間一望山青水又緑終日只一餐夜後只一宿困來仲腳眠千足與萬足相將八月九月來籬邊爛熳鋪黃菊東林顏云今時師僧千百成群經冬過夏虛消歲月深屈古人東林不是撿點先聖仰山逞俊太過吐舌只得一半溈山一日見師來即以兩手相交過各撥三下却竪一指師亦以兩手相交過各撥三下却向胸前仰一手覆一手以目瞻視溈山休去溈山餧鴉生飯回頭見師云今日為伊上堂一上師云某甲隨例得聞溈山云聞底事作麼生師云鴉作鴉鳴鵲作鵲噪溈山云爭奈聲色何師云和尚適來道甚麼溈山云我祇道為伊上堂一上師云為甚麼喚作聲色溈山云雖然如此驗過也無妨師云大事因緣又作麼生驗溈山竪起拳師云終是指東畫西溈山云子適來問甚麼師云問和尚大事因緣溈山云為甚麼喚作指東畫西師云為著聲色故某甲所以問過溈山云並未曉了此事師云如何得曉了此事溈山云寂子聲色老僧東西師云一月千江體不分水溈山云應須與麼始得師云如金與金終無異色豈有異名溈山云作麼生是無異名底道理師云瓶盤叉釧券盂盆溈山云寂子説禪如師子吼驚散狐狼野干之屬師一日侍溈山忽聞鳥鳴溈山云伊説事却徑師云不可向別人道溈山云何故恁麼道師云為伊説太直溈山云多少法門寂子一時推下師云推下事作麼生溈山敲禪床三下師住王莽山因歸省覲溈山問子既稱善知識爭辨得諸方來者知有不知有有師承無師承是義學是玄學子試説看師云慧寂有驗處但見僧來便竪起拂子問伊諸方還説這箇不説又云這箇且置諸方老宿意作麼生溈山歎云此是從上宗門中牙爪溈山又問大地衆生業識茫茫無本可據子作麼生知他有之與無師云慧寂有驗處時有一僧從面前過師召云闍黎僧回首師云和尚這個便是業識茫茫無本可據溈山云此是師子一滴乳迸散六斛驢乳師問雙峯師弟近日見處如何云據某見處實無一法可當情師云汝解猶在境云某祇如此師兄又如何師云汝豈不知無一法可當情者溈山聞云寂子一句疑殺天下人玄覺云經道實無有法然燈佛與我授記他道實無一法可當情為甚麼道解猶在境且道利害在甚麼處一日雨下天性上座謂師云好雨師云好在甚麼處天性無語師云某甲却道得天性云好在甚麼處師指雨天性又無語師云何得大智而默一日第一座舉起拂子云若人作得道理即與之師云某甲作得道理還得否座云但作得道理便得師乃掣將拂子去雲居鍚云甚麼處是仰山道理龐居士問久嚮仰山到來為甚麼却覆師竪起拂子居士云恰是師云是仰是覆居士乃打露柱云雖然無人也要露柱證明師擲拂子云若到諸方一任舉似隱靜岑云大小小釋迦被龐居士一拶直得手忙腳亂只如居士打露柱一下又作麼生鯨吞海水盡露出珊瑚枝三聖到參師問汝名甚麼三聖云慧寂師云慧寂是我名三聖云我名慧然師大笑而已有官人訪師師問官居何位云推官師竪起拂子云還推得這箇麼官人無對師令衆下語皆不契時三聖不安在涅槃堂內將息師令侍者去請下語三聖云但道和尚今日有事師又令侍者問未審有甚麼事三聖云再犯不容南塔光涌禪師北遊謁臨濟復歸侍師師云汝來作甚麼南塔云禮覲和尚師云還見和尚麼南塔云見師云和尚何似驢南塔云某甲見和尚亦不似佛師云若不似佛似箇甚麼南塔云若有所似與驢何別師大驚云凡聖兩忘情盡體露吾以此驗人二十年無決了者子保任之師每謂人云此子肉身佛也霍山到參師閉目坐霍山乃翹起右足云如是如是西天二十八祖亦如是中華六祖亦如是和尚亦如是景通亦如是師起來打四藤條霍山因此自稱集雲峯下四藤條天下大禪師赤干行者聞鐘聲乃問有耳打鐘無耳打鐘師云汝但問莫愁我答不得行者云早箇問了也師喝云去劉侍御問了心之旨可得聞乎師云若要了心無心可了無了之心是名真了陸希聲相公欲謁師先作此相封呈師開封於相下面書云不思而知落第二頭思而知之落第三首遂封回公見即入山師乃門迎公才入門便問三門俱開從何門入師云從信門入公至法堂又問不出魔界便入佛界時如何師以拂子倒點三下公便設禮又問和尚還持戒否師云不持戒云還坐禪否師云不坐禪公良久師云會麼云不會師云聽老僧一頌滔滔不持戒兀兀不坐禪釅茶三兩碗意在钁頭邊師却問承聞相公看經得悟是否云弟子因看涅槃經有云不斷煩惱而入涅槃得箇安樂處師竪起拂子云祇如這箇作麼生入云入之一字也不消得師云入之一字不為相公公便起去法燈云上座且道入之一字為甚麼人又云相公且莫煩惱雪竇顯於仰山舉拂處別云拂子到某甲手裏也又別後語云我將謂爾是箇俗漢師因韋宙就溈山請一伽陀溈山云覿面相呈猶是鈍漢豈況形於紙墨韋乃就師請師於紙上畫一圓相注云思而知之落第二頭不思而知落第三首師為沙彌時和安通一日召師將床子來師將到和安云却送本處著師從之和安召慧寂師應諾和安云床子那邊是甚麼物師云枕子和安云枕子這邊是甚麼物師云無物和安復召慧寂師應諾和安云是甚麼師為沙彌時有僧問石霜如何是祖師西來意石霜云如人在千尺井中不假寸繩出得此人即答汝西來意僧云近日湖南暢和尚出世亦為人東語西話石霜喚沙彌拽出這死尸著師後問耽源如何出得井中人耽源云咄癡漢誰在井中師往問溈山溈山召慧寂師應諾溈山云出也師住後常舉前話謂衆云我在耽源處得名溈山處得地師作沙彌時念經聲高乳源和尚咄云這沙彌念經恰似哭師云慧寂祇恁麼未審和尚如何乳源乃顧視師云若恁麼與哭何異乳源便休師參東寺東寺問汝是甚處人師云廣南人東寺云我聞廣南有鎮海明珠是否師云是東寺云此珠如何師云黑月即隱白月即現東寺云還將得來也無師云將得來東寺云何不呈似老僧師叉手近前云昨到溈山亦被索此珠直得無言可對無理可伸東寺云真師子兒善能哮吼蔣山勤云東寺只索一顆仰山傾出一栲栳師禮拜了却入客位具威儀再上人事東寺見乃云已相見了也師云恁麼相見莫不當否東寺歸方丈閉却門師歸舉似溈山溈山云寂子是甚麼心行師云若不恁麼爭識得伊保福展云仰山大似蚊子上鐵牛承天宗云仰山識得東寺強説道理即不可設使溈山去也未能得與東寺相見在師問東寺云借一路過那邊還得否東寺云大凡沙門不可祇一路也別更有麼師良久東寺却問借一路過那邊得否師云大凡沙門不可祇一路也別更有麼東寺云祇有此師云大唐天子決定姓金師在中邑謝戒中邑拍口作和和聲師從西過東中邑又拍口作和和聲師從東過西中邑又拍口作和和聲師當中而立然後謝戒中邑云甚麼處得此三昧師云於曹溪印子上脫來中邑云汝道曹溪用此三昧接甚麼人師云接一宿覺師云和尚甚處得此三昧中邑云我於馬大師處得此三昧琅琊覺云愁人莫向愁人説師問如何得見佛性義中邑云我與汝説箇譬喻如一室有六窗內有一獼猴外有獼猴從東邊喚猩猩猩猩即應如是六窗俱喚俱應師禮謝起云適蒙和尚譬喻無不了知更有一事祇如內獼猴睡著外獼猴欲與相見又且如何中邑下繩床執師手作舞云猩猩與汝相見了譬如蟭螟蟲在蚊子眼睫上作窠向十字街頭叫云土曠人稀相逢者少雲居錫云中邑當時若不得仰山這一句語何處有中邑也崇壽稠云還有人定得此道理麼若定不得只是箇弄精魂腳手佛性義在甚麼處玄覺云若不是仰山爭得見中邑且道甚麼處是仰山得見中邑處師參巖頭巖頭舉起拂子師展坐具巖頭拈拂子置背後師將坐具搭肩上而出巖頭云我不肯汝放祇肯汝收師與長沙玩月次師云人人盡有這箇祇是用不得長沙云恰是倩汝用師云爾作麼生用長沙劈胸與一踏師云㘞直下似箇大蟲長慶稜云前彼此作家後彼此不作家乃別云邪法難扶保福展云好一箇月只是用力太多被他踏破却成兩箇人人盡道岑大蟲奇特須知仰山有陷虎之機德山密代云更與一踏琅琊覺云李陵雖好手爭兔陷畬身徑山杲云皎潔一輪寒光萬里靈利者葉落知秋闒茸者忠言逆耳休不休已不已小釋迦有陷虎之機老大蟲却無牙齒當時一踏豈造次驀然倒地非偶爾衆中還有緇素得二老出者麼良久云設有也是掉棒打月師參古堤和尚古堤云去汝無佛性師叉手近前三步應諾古堤笑云子甚麼處得此三昧來師云我從耽源處得名溈山處得地古堤云莫是溈山的子麼師云世諦即不無佛法即不敢師却問和尚從甚處得此三昧古堤云我從章敬處得此三昧師嘆云不可思議來者難為湊泊師到虔州處微處微問云汝名甚麼師云慧寂處微云那箇是慧那箇是寂師云祇在目前處微云猶有前後在師云前後且置和尚見箇甚麼處微云喫茶去師後開法王莽山問僧近離甚處僧云廬山師云曾到五老峯麼僧云不曾到師云闍黎不曾遊山雲門偃云此語皆為慈悲之故有落草之談溈山秀云今人盡道慈悲之故有落草之談只知捉月不覺水深忽若雲門當時謹慎唇吻未審後人若為話會然水母無目求食須假於蝦黃龍心云雲門仰山只有受璧之心且無割城之意殊不知被這僧一時領過黃龍今日更作死馬醫乃拈拂子度與僧僧擬接便打溈山哲云仰山可謂光前絶後雲門雖然提綱宗要鉗鎚天下衲僧爭奈無風起浪諸人還識這僧麼親從廬山來黃龍震云仰山已是失却鼻孔雲門更下注腳有什麼救急處我即不然近離甚處云廬山曾到五老峰麼云不曾到只向道別甑吹香供養此人上堂汝等諸人各自回光返照莫記吾言汝無始劫來背明投暗妄想根深卒難頓拔所以假設方便奪汝麁識如將黃葉止啼有甚麼是處亦如人將百種貸物與金寶作一鋪貸賣祇擬輕重來機所以道石頭是真金鋪我這裏是雜貨鋪有人來覓鼠糞我亦拈與他來覓真金我亦拈與他時有僧問鼠糞即不要請和尚真金師云囓鏃擬開口驢年亦不會僧無對師云索喚則有交易不索喚則無我若説禪宗身邊要一人相伴亦無豈況有五百七百衆耶我若東説西説則爭頭向前采拾如將空拳誑小兒都無實處我今分明向汝説聖邊事且莫將心湊泊但向自己性海如實而修不要三明六通何以故此是聖末邊事如今且要識心達本但得其本不愁其末他時後日自具去在若未得本縱饒將情學他亦不得汝豈不見溈山和尚云凡聖情盡體露真常事理不二即如如佛僧問如何是祖師意師以手於空作此相示之僧無語師謂第一座云不思善不思惡正恁麼時作麼生座云正恁麼時是某甲放身命處師云何不問老僧座云正恁麼時不見有和尚師云扶我教不起師問僧甚處來僧云幽州師云我恰要箇幽州信米作麼價僧云某甲來時無端從市中過踏折他橋梁師便休侯寧勇云放爾三十棒師見僧來竪起拂子僧便喝師云喝即不無且道老僧過在甚麼處僧云和尚不合將境示人師便打有梵師從空而至師云近離甚處云西天師云幾時離彼云今早師云何太遲生云遊山玩水師云神通遊戲則不無闍黎佛法須還老僧始得云特來東土禮文殊却遇小釋迦遂出梵書貝多葉與師作禮乘空而去自此號小釋迦東林總云者方商量如麻似粟盡道這碧眼胡兒來無蹤去無迹直是光前絶後若不是仰山也難為縱奪諸禪德殊不知這碧眼胡兒騰空而來騰空而去一生只在虛空裏作活計有什麼光前絶後大小仰山被他將兩杓惡水驀頭澆了也當時集雲峯下自有正令何不施行大衆且道作麼生是正令咄黃龍新云大小仰山被這僧熱瞞更出貝多梵書塗糊一上如今更有異僧乘空而至雲巖門下喚來洗腳泐潭準云可惜仰山放過這漢當時若是寶峯便與擒住須教維那僧堂前撞鐘集衆責狀趕出況佛法不當人情既稱羅漢諸漏已盡梵行已立為什麼不歸家穩坐只管遊山玩水昭覺勤云驅耕夫之牛奪飢人之食是從上爪牙這羅漢具許多神通妙用到仰山面前直得目瞪口呿何故鶴有九皋難翥翼馬無千里謾追風大溈泰云大衆仰山只知進前趁鹿不知身墮網羅尊者偶爾成文頗有衲僧氣息若人會得許爾倒捋虎鬚師住東平時溈山令僧送書并鏡與師師上堂提起示衆云且道是溈山鏡東平鏡若道是東平鏡又是溈山送來若道是溈山鏡又在東平手裏道得則留取道不得則撲破去也衆無語師遂撲破便下座五祖戒云更請和尚説道理看驀奪打破僧參次便問和尚還識字否師云隨分僧以手畫此相拓呈師以衣袖拂之僧又作此相拓呈師以兩手作背拋勢僧以目視之師低頭僧繞師一匝師便打僧遂出去師坐次有僧來作禮師不顧其僧乃問師識字否師云隨分師乃右旋一匝云是甚麼字師於地上書十字酬之僧又左旋一匝云是甚麼字師改十字作卍字僧畫此相以兩手拓如修羅掌日月勢云是甚麼字師乃畫此相對之僧乃作婁至德勢師云如是如是此是諸佛之所護念汝亦如是吾亦如是善自護持其僧禮謝騰空而去時有一道者見經五日後遂問師師云汝還見否道者云某甲見出門騰空而去師云此是西天羅漢故來探吾道道者云某雖覩種種三昧不辨其理師云吾以義為汝解釋此是八種三昧是覺海變為義海體則同然此義合有因有果即時異時總別不離隱身三昧也師因一梵僧來參師於地上畫半月相僧近前添作圓相似腳抹却師展兩手僧拂袖便出師問僧近離甚處云南方師舉拄杖云彼中老宿還説這箇麼云不説師云既不説這箇還説那箇否云不説師召大德僧應諾師云參堂去僧便出師復召云大德僧回首師云近前來僧近前師以拄杖頭上點一下云去雲門偃云仰山若無後語爭識得人師一日在法堂上坐見一僧從外來便問訊了向東邊叉手立以目視師師乃垂下左足僧却過西邊叉手立師垂下右足僧向中間叉手立師收雙足僧禮拜師云老僧自住此未曾打著一人拈拄杖便打僧便騰空而去師指雪師子問衆有過得此色者麼衆無對雲門云當時便好與推倒雪竇顯云雲門只解推倒不解扶起師臥次僧問云法身還解説法也無師云我説不得別有一人説得云説得底人在甚麼處師推出枕子溈山聞云寂子用劍刃上事徑山杲云溈山正是憐兒不覺醜仰山推出枕子已是漏逗更著箇名字喚作劍刃上事誤他學語之流便恁麼承虛接響流通將去妙喜雖則借水獻華要且理無曲斷即今莫有傍不肯底出來我要問爾推出枕子還當得法身説法也無天童華云若是劍刃上事寂子何曾會用忽有箇僧出來問法身還解説法也無向他道我説不得別有一人説得又問説得底人在甚處只向他道三生六十劫靈隱嶽云仰山從前一條脊梁硬如鐵被這僧連拶便乃四楞塌地溈山一期忍俊不禁不知失却一隻眼忽有僧問冶父法身還解説法也無便與攔胸一踏踏倒教伊起來作箇灑灑落落底漢不見道犀因玩月紋生角象被雷驚華入牙師閉目坐次有僧潛來身邊立師開目於地上作此相顧視其僧僧無語師携拄杖行次僧問和尚手中是甚麼師便拈向背後云見麼僧無對師問一僧汝會甚麼云會卜師提起拂子云這箇六十四卦中阿那卦收僧無對師自代云適來是雷天大壯如今變為地火明夷問僧名甚麼云靈通師云便請入燈籠云早箇入了也法眼別云喚甚麼作燈籠問古人道見色便見心禪床是色請和尚離却色指學人心師云那箇是禪床指出來看僧無對玄覺云忽然被伊却指禪床作麼生對伊有僧云却請和尚道玄覺代拊掌三下問如何是毗盧師師乃叱之僧云如何是和尚師師云莫無禮師共一僧語旁有僧云語底是文殊默底是維摩師云不語不默底莫是汝否僧默然師云何不現神通云不辭現神通祇恐和尚收作教師云鑒汝來處未有教外底眼問天堂地獄相去幾何師將拄杖畫地一畫師住觀音時出榜云看經次不得問事有僧來問訊見師看經旁立而待師卷却經問會麼云某甲不看經爭得會師云汝已後會去在其僧到巖頭巖頭問甚處來云江西觀音來巖頭云和尚有何言句僧舉前話巖頭云這箇老師我將謂被故紙埋却元來猶在僧恩𨜶問禪宗頓悟畢竟入門的意如何師云此意極難若是祖宗門下上根上智一聞千悟得大總持其有根微智劣若不安禪靜慮到這裏總須茫然云除此一路別更有入處否師云有云如何即是師云汝是甚處人云幽州人師云汝還思彼處否云常思師云能思者是心所思者是境彼處樓臺林苑人馬駢闐汝反思底還有許多般也無云某甲到這裏總不見有師云汝解猶在心信位即得人位未在云除却這箇別更有意也無師云別有別無即不堪也云到這裡作麼生即是師云據汝所解祇得一玄得坐披衣向後自看𨜶禮謝之僧問大耳三藏第三度為甚麼不見國師師云前兩度是涉境心後入自受用三昧所以不見溈山問師百丈再參馬祖因緣此二尊宿意旨如何師云此是顯大機大用溈山云馬祖出八十四人善知識幾人得大機幾人得大用師云百丈得大機黃檗得大用餘者盡是唱導之師溈山云如是如是溈山舉百丈野狐話問師師云黃檗常用此機溈山云汝道天生得從人得師云亦是稟受師承亦是自性宗通溈山云如是如是溈山舉百丈問黃檗甚處去來黃檗云大雄山下採𮏄子來百丈云還見大蟲麼黃檗便作虎聲百丈拈斧作斫勢黃檗遂與百丈一摑百丈吟吟而笑便歸升堂謂衆云大雄山下有一大蟲汝等諸人也須好看百丈老漢今日親遭一口問師作麼生師云和尚怎生溈山云百丈當時便合一斧斫殺因甚麼到如此師云不然溈山云子又作麼生師云百丈只解騎虎頭不解把虎尾溈山云子有嶮崖之句溈山舉南泉問黃檗定慧等學明見佛性此理如何黃檗云十二時中不依倚一物南泉云莫便是長老見處麼黃檗云不敢南泉云漿水錢且置草鞋錢教誰還黃檗休去問師云莫是黃檗搆他南泉不得麼師云不然須知黃檗有陷虎之機溈山云子見處得與麼長黃檗在南泉為首座一日捧鉢向南泉位中坐南泉入堂見乃問長老甚年中行道黃檗云威音王已前南泉云猶是王老師兒孫下去黃檗便過第二位坐南泉便休溈山云欺敵者亡師云不然須知黃檗有陷虎之機溈山云子見處得與麼長溈山舉黃檗示衆云汝等諸人盡是噇酒糟漢與麼行腳何處有今日還知大唐國裏無禪師麼時有僧云只如諸方匡徒領衆又作麼生黃檗云不道無禪只是無師問師作麼生師云鵝王擇乳素非鴨類溈山云此實難辨溈仰師資鼓唱拈評機語儘多如具臨濟録中者茲不重載奯上座因到百丈百丈云闍黎有事相借問得麼奯云幸自非言何須譗𧫡百丈云收得安南又憂塞北奯擘開胸云與麼不與麼百丈云要且難搆要且難搆奯云知即得知即得師云若有人知此二人落處不妨奇特若辨不得大似日中迷露舉五峯問僧甚麼處來僧云莊上來五峯云汝還見牛麼僧云見五峯云見左角見右角僧無語五峯代云見無左右師別云還辨左右麼有一行者隨法師入佛殿行者向佛而唾法師云行者少去就何以唾佛行者云將無佛處來與某甲唾法師無對溈山云仁者却不仁者不仁者却仁者師代法師云但唾行者又云行者若有語即向伊道還我無行者處來師接機利物為宗門標準再遷東平將順寂數僧侍立師以偈示之云一二二三子平目復仰視兩口一無舌即是吾宗旨至日午升座辭衆復説偈云年滿七十七無常在今日日輪正當午兩手攀屈膝言訖以兩手抱膝而終閲明年南塔涌禪師遷靈骨歸仰山塔於集雲峯下諡智通禪師妙光之塔
